<script>

/* =========================================================
   GOOGLE SHEETS CLOUD CONFIG
========================================================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbw_BVBoWr2VNi0gJkgkqShQXFTLugmd-3qN4ORyWKz-tu7CoUkXOcmtsnEALMvaYaU6AA/exec";

const API_KEY = "EE_SECURE_2026_KEY";

/* =========================================================
   GLOBAL STATE
========================================================= */

let applications = [];

/* =========================================================
   INITIALIZATION
========================================================= */

window.onload = async () => {

    document.getElementById('current-date')
    .textContent = new Date().toDateString();

    if(localStorage.getItem('ee_dark') === 'true'){
        document.body.classList.add('dark');
    }

    runComplianceChecks();

    await loadApplicationsFromCloud();

    setInterval(async () => {

        await loadApplicationsFromCloud();

    }, 30000);

};

/* =========================================================
   LOAD APPLICATIONS FROM GOOGLE SHEETS
========================================================= */

async function loadApplicationsFromCloud(){

    try{

        showToast("Loading cloud data...");

        const response = await fetch(
            `${API_URL}?key=${API_KEY}&action=read`
        );

        const result = await response.json();

        if(result.status === "success"){

            applications = result.data || [];

            renderAll();

            showToast("Applications synced ✔️");

        }else{

            showToast(result.message, "danger");

        }

    }catch(error){

        console.error(error);

        showToast("Cloud sync failed", "danger");

    }

}

/* =========================================================
   SAVE APPLICATION TO GOOGLE SHEETS
========================================================= */

async function saveApplicationToCloud(application){

    try{

        const response = await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                key: API_KEY,
                action: "create",
                ...application
            })

        });

        const result = await response.json();

        if(result.status === "success"){

            showToast("Application saved ✔️");

        }else{

            showToast(result.message, "danger");

        }

    }catch(error){

        console.error(error);

        showToast("Save failed", "danger");

    }

}

/* =========================================================
   DELETE APPLICATION
========================================================= */

async function deleteApplication(ref){

    if(!confirm("Delete this application?")){
        return;
    }

    try{

        const response = await fetch(API_URL, {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                key: API_KEY,
                action: "delete",
                ref
            })

        });

        const result = await response.json();

        if(result.status === "success"){

            applications =
            applications.filter(a => a.Ref !== ref);

            renderAll();

            showToast("Application deleted");

        }else{

            showToast(result.message, "danger");

        }

    }catch(error){

        console.error(error);

        showToast("Delete failed", "danger");

    }

}

/* =========================================================
   PROCESS NEW LOAN
========================================================= */

async function processNewLoan(){

    const name =
    document.getElementById('client-name').value.trim();

    const id =
    document.getElementById('client-id').value.trim();

    const amt =
    parseFloat(
        document.getElementById('loan-amount').value
    );

    const term =
    parseInt(
        document.getElementById('loan-term').value
    );

    if(!name || !id || !amt || !term){

        showToast("Complete all fields", "danger");

        return;

    }

    const idValid = validateSAID(id);

    if(!idValid){

        showToast("Invalid SA ID", "danger");

        return;

    }

    const nca = calculateNCA(amt, term);

    const application = {

        ref:
        'EE' +
        Math.floor(
            100000 + Math.random() * 900000
        ),

        name,
        id,

        amount: amt,

        term,

        status: "Approved",

        riskGrade: "B",

        creditScore: 650,

        phone: "",

        date:
        new Date().toLocaleDateString()

    };

    await saveApplicationToCloud(application);

    document.getElementById('calc-output')
    .innerHTML = `

        <div class="alert success">

            <strong>
                Estimated Installment:
                R${nca.monthly.toFixed(2)}
            </strong>

            <br><br>

            Total Repayable:
            R${nca.total.toFixed(2)}

            <br>

            Initiation Fee:
            R${nca.initiation.toFixed(2)}

            <br>

            Service Fees:
            R${nca.serviceFee.toFixed(2)}

        </div>

    `;

    await loadApplicationsFromCloud();

}

/* =========================================================
   RENDER APPLICATION TABLE
========================================================= */

function renderAll(){

    const body =
    document.getElementById('application-body');

    body.innerHTML = '';

    let totalVal = 0;

    applications.forEach(app => {

        const amount =
        Number(app.Amount || app.amount || 0);

        totalVal += amount;

        const row =
        document.createElement('tr');

        const status =
        app.Status || app.status;

        const ref =
        app.Ref || app.ref;

        const name =
        app.Name || app.name;

        const id =
        app.ID || app.id;

        let badge = 'badge-pending';

        if(status === 'Approved'){
            badge = 'badge-approved';
        }

        row.innerHTML = `

            <td>${ref}</td>

            <td>${name}</td>

            <td>
                ${validateSAID(id)
                ? '✅ Valid'
                : '⚠️ Invalid'}
            </td>

            <td>
                R${amount.toLocaleString()}
            </td>

            <td>
                <span class="badge ${badge}">
                    ${status}
                </span>
            </td>

            <td>

                <div style="display:flex;gap:10px;">

                    <button
                        class="btn btn-secondary"
                        onclick="generateReceipt('${ref}')"
                    >
                        <i class="fa-solid fa-file-pdf"></i>
                    </button>

                    <button
                        class="btn btn-danger"
                        onclick="deleteApplication('${ref}')"
                    >
                        <i class="fa-solid fa-trash"></i>
                    </button>

                </div>

            </td>

        `;

        body.appendChild(row);

    });

    document.getElementById('loan-value')
    .textContent =
    `R${totalVal.toLocaleString()}`;

}

/* =========================================================
   SA ID VALIDATION
========================================================= */

function validateSAID(id){

    if(!/^\d{13}$/.test(id)){
        return false;
    }

    let sum = 0;

    for(let i = 0; i < 13; i++){

        let n = parseInt(id[i]);

        if(i % 2 !== 0){

            n *= 2;

            if(n > 9){
                n -= 9;
            }

        }

        sum += n;

    }

    return sum % 10 === 0;

}

/* =========================================================
   NCA CALCULATOR
========================================================= */

function calculateNCA(amount, months){

    let initiation =
    amount <= 1000
    ? amount * 0.15
    : 165 + ((amount - 1000) * 0.10);

    initiation =
    Math.min(initiation, 1207.50);

    const interest =
    amount * 0.05 * months;

    const serviceFee =
    79.35 * months;

    const total =
    amount +
    initiation +
    interest +
    serviceFee;

    return {

        initiation,

        interest,

        serviceFee,

        total,

        monthly:
        total / months

    };

}

/* =========================================================
   COMPLIANCE CHECKS
========================================================= */

function runComplianceChecks(){

    const today = new Date();

    const day = today.getDate();

    const sars =
    document.getElementById('sars-alert');

    if(day > 7){

        sars.className =
        "alert danger";

        sars.innerHTML =
        "🚨 EMP201 OVERDUE";

    }else{

        sars.className =
        "alert success";

        sars.innerHTML =
        "✅ EMP201 Filed";

    }

    const ncr =
    document.getElementById('ncr-alert');

    const diff =
    15 - day;

    ncr.className =
    diff <= 4
    ? "alert danger"
    : "alert warning";

    ncr.innerHTML =
    `📅 NCR Form 39 Due In ${diff} Days`;

}

/* =========================================================
   RECEIPT PDF
========================================================= */

function generateReceipt(ref){

    const app =
    applications.find(a =>
        (a.Ref || a.ref) === ref
    );

    if(!app){
        return;
    }

    const amount =
    Number(app.Amount || app.amount);

    const term =
    Number(app.Term || app.term);

    const nca =
    calculateNCA(amount, term);

    const temp =
    document.getElementById('receipt-template');

    temp.style.display = 'block';

    temp.innerHTML = `

        <div
            style="
                padding:40px;
                font-family:Arial;
                color:#333;
            "
        >

            <center>

                <h2>
                    EQUILIBRIO ELITE
                </h2>

                <p>
                    Registered Credit Provider
                </p>

                <hr style="margin:20px 0;">

            </center>

            <p>
                <strong>Reference:</strong>
                ${ref}
            </p>

            <p>
                <strong>Client:</strong>
                ${app.Name || app.name}
            </p>

            <p>
                <strong>Loan Amount:</strong>
                R${amount.toFixed(2)}
            </p>

            <p>
                <strong>Total Repayable:</strong>
                R${nca.total.toFixed(2)}
            </p>

            <p>
                <strong>Monthly Instalment:</strong>
                R${nca.monthly.toFixed(2)}
            </p>

            <br><br>

            <small>
                Subject to NCA and POPIA regulations.
            </small>

        </div>

    `;

    html2pdf()
    .from(temp)
    .set({
        filename: `Receipt_${ref}.pdf`
    })
    .save()
    .then(() => {

        temp.style.display = 'none';

    });

}

/* =========================================================
   DARK MODE
========================================================= */

function toggleDarkMode(){

    document.body.classList.toggle('dark');

    localStorage.setItem(
        'ee_dark',
        document.body.classList.contains('dark')
    );

}

/* =========================================================
   SIDEBAR
========================================================= */

function toggleSidebar(){

    document.getElementById('sidebar')
    .classList.toggle('show');

}

/* =========================================================
   TOASTS
========================================================= */

function showToast(msg, type='success'){

    const container =
    document.getElementById('toast-container');

    const toast =
    document.createElement('div');

    toast.className = 'toast';

    if(type === 'danger'){
        toast.style.borderLeftColor =
        'var(--danger)';
    }

    toast.textContent = msg;

    container.appendChild(toast);

    setTimeout(() => {

        toast.remove();

    }, 3000);

}

</script>
