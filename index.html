<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5Clipa Command Centre PRO • Equilibrio Elite</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fa-solid fa-scale-balanced"></i>
            <span>Equilibrio Elite</span>
        </div>
        <nav>
            <a href="#" class="nav-item active" data-tab="0"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="#" class="nav-item" data-tab="1"><i class="fa-solid fa-file-circle-plus"></i> New Application</a>
            <a href="#" class="nav-item" data-tab="2"><i class="fa-solid fa-chart-line"></i> Analytics</a>
            <a href="#" class="nav-item" data-tab="3"><i class="fa-solid fa-shield-halved"></i> Compliance</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <h1 id="page-title">Command Centre</h1>
            </div>
            <div class="topbar-right">
                <button onclick="exportFullReport()" class="btn-elite">
                    <i class="fa-solid fa-file-pdf"></i> Export Report
                </button>
            </div>
        </header>

        <div id="tab-content"></div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="assets/js/constants.js"></script>
    <script src="assets/js/validation.js"></script>
    <script src="assets/js/calculator.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/pdf.js"></script>
    <script src="assets/js/whatsapp.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
